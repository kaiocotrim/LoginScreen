<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Acesse sua conta</title>
  <link rel="stylesheet" href="css/login.css" />
</head>

<body>
  <main class="login-container">
    <div class="login-card">
      <!-- Brand -->
      <div class="brand">
        <div class="brand-logo">
          <a href="index.html" id="logoHome">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z" />
              <path d="M2 17l10 5 10-5" />
              <path d="M2 12l10 5 10-5" />
            </svg>
          </a>
        </div>
        <h1>Bem-vindo de volta</h1>
        <p>Entre com sua conta para continuar</p>
      </div>

      <!-- Form -->
      <form class="login-form" id="login-form">
        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="voce@exemplo.com" required autocomplete="email" />
        </div>

        <div class="field">
          <div class="field-header">
            <label for="password">Senha</label>
            <a href="#" class="link-muted">Esqueceu?</a>
          </div>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="toggle-password" onclick="togglePassword()">Mostrar</button>
          </div>
        </div>

        <!-- Confirmar senha (aparece ao cadastrar) -->
        <div class="field field-confirm" id="confirm-field">
          <label for="password-confirm">Confirmar senha</label>
          <div class="password-wrapper">
            <input type="password" id="password-confirm" placeholder="••••••••" autocomplete="new-password" />
          </div>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Entrar</button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <span>ou</span>
      </div>

      <!-- Google -->
      <button type="button" class="btn-social">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Continuar com Google
      </button>

      <!-- Footer -->
      <p class="signup">
        Não tem uma conta? <a href="#" id="toggle-signup">Cadastre-se</a>
      </p>
    </div>
  </main>
  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.querySelector('.toggle-password');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Ocultar';
      } else {
        input.type = 'password';
        btn.textContent = 'Mostrar';
      }
    }

    let isSignup = false;
    const toggleLink = document.getElementById('toggle-signup');
    const confirmField = document.getElementById('confirm-field');
    const confirmInput = document.getElementById('password-confirm');
    const submitBtn = document.getElementById('submit-btn');
    const brandTitle = document.querySelector('.brand h1');
    const brandSub = document.querySelector('.brand p');

    toggleLink.addEventListener('click', (e) => {
      e.preventDefault();
      isSignup = !isSignup;

      if (isSignup) {
        confirmField.classList.add('show');
        confirmInput.required = true;
        submitBtn.textContent = 'Criar conta';
        brandTitle.textContent = 'Crie sua conta';
        brandSub.textContent = 'Preencha os dados para começar';
        toggleLink.textContent = 'Entrar';
        toggleLink.parentElement.firstChild.textContent = 'Já tem uma conta? ';
        if (window.setSignupMode) window.setSignupMode(true);
      } else {
        confirmField.classList.remove('show');
        confirmInput.required = false;
        confirmInput.value = '';
        submitBtn.textContent = 'Entrar';
        brandTitle.textContent = 'Bem-vindo de volta';
        brandSub.textContent = 'Entre com sua conta para continuar';
        toggleLink.textContent = 'Cadastre-se';
        toggleLink.parentElement.firstChild.textContent = 'Não tem uma conta? ';
        if (window.setSignupMode) window.setSignupMode(false);
      }
    });
  </script>
  <script type="module" src="js/ui.js"></script>
</body>

</html>
